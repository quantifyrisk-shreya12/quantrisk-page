    <style>
      /* New text gradient for the light theme */
      .text-gradient {
        background: linear-gradient(90deg, #6B46C1, #8A2BE2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }
      /* New button gradient for the light theme */
      .button-gradient {
        background: linear-gradient(90deg, #6B46C1, #8A2BE2);
      }
       .button-gradient:hover {
        background: linear-gradient(90deg, #8A2BE2, #6B46C1);
      }
      /* Section title gradient remains the same as it works on light backgrounds */
       .section-title-gradient {
        background: linear-gradient(90deg, #5a3c9a, #8242c7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }
    </style>
